name: openlogtool
description: OpenLogTool - 业余无线电点名记录工具
publish_to: 'none'
version: 1.0.0+1
license: GPL-3.0-or-later
homepage: https://github.com/Mazha0309/openlogtool
repository: https://github.com/Mazha0309/openlogtool.git
issue_tracker: https://github.com/Mazha0309/openlogtool/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  path_provider: ^2.1.3
  excel: ^4.0.6
  provider: ^6.1.1
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  open_file: ^3.3.3
  forui: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - icon.png
  uses-material-design: true