publish_to: 'none'
version: 1.0.0+1
license: GPL-3.0-or-later
homepage: https://github.com/Mazha0309/BG5CRL-Log-tool
repository: https://github.com/Mazha0309/BG5CRL-Log-tool.git
issue_tracker: https://github.com/Mazha0309/BG5CRL-Log-tool/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  file_picker: ^6.1.1
  path_provider: ^2.1.3
  excel: ^4.0.6
  provider: ^6.1.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  open_file: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true