name: Build OpenLogTool

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # 读取提交号作为版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          # 获取提交SHA
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 获取构建次数作为版本号
          BUILD_NUMBER=${{ github.run_number }}
          # 确保版本号从1开始
          VERSION=$((BUILD_NUMBER))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  # 构建 Android APK
  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get pubspec version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Generate version file
        env:
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_BUILD_NUMBER: ${{ needs.get-version.outputs.build_number }}
        run: dart tool/gen_version.dart

      - name: Create keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > android/app/keystore.jks

      - name: Create keystore properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n' \
            "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            "${{ secrets.KEYSTORE_KEY_PASSWORD }}" \
            "${{ secrets.KEYSTORE_KEY_ALIAS }}" > android/app/keystore.properties
          echo "=== keystore.properties content ==="
          cat android/app/keystore.properties

      - name: Verify keystore
        run: |
          ls -la android/app/keystore.jks
          keytool -list -v -keystore android/app/keystore.jks -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD }}" -alias "${{ secrets.KEYSTORE_KEY_ALIAS }}"

      - name: Set Gradle version
        run: |
          sed -i 's/VERSION_PLACEHOLDER/${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}-${{ needs.get-version.outputs.build_number }}/' android/app/build.gradle.kts
          echo "=== After sed replacement ==="
          grep "appVersionName" android/app/build.gradle.kts

      - name: Debug gradle config
        run: |
          echo "=== Full gradle content ==="
          head -35 android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Clean Gradle cache
        run: |
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf build

      - name: Build APK with version
        env:
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          GRADLE_OPTS: "-Dorg.gradle.project.VERSION_NAME=${{ env.VERSION_NAME }} -Dorg.gradle.project.CI_COMMIT_SHA=${{ github.sha }} -Dorg.gradle.project.CI_BUILD_NUMBER=${{ github.run_number }}"
        run: |
          flutter build apk --release \
            --build-name="${{ env.VERSION_NAME }}.${{ needs.get-version.outputs.short_sha }}" \
            --build-number="${{ needs.get-version.outputs.build_number }}"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/OpenLogTool-${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-android-apk
          path: build/app/outputs/flutter-apk/OpenLogTool-${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}.apk

  # 构建 Linux
  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get pubspec version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Set Gradle version
        run: |
          sed -i 's/VERSION_PLACEHOLDER/${{ env.VERSION_NAME }}/' android/app/build.gradle.kts
          sed -i 's/COMMIT_PLACEHOLDER/${{ needs.get-version.outputs.short_sha }}/' android/app/build.gradle.kts
          sed -i 's/BUILD_PLACEHOLDER/${{ needs.get-version.outputs.build_number }}/' android/app/build.gradle.kts
          head -15 android/app/build.gradle.kts

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package as tar.gz
        run: |
          cd build/linux/x64/release
          tar -czvf openlogtool-${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}-linux-x86_64.tar.gz bundle/

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-linux
          path: build/linux/x64/release/openlogtool-${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}-linux-x86_64.tar.gz

  # 构建 Windows
  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get pubspec version
        shell: pwsh
        run: |
          $line = Select-String -Path "pubspec.yaml" -Pattern "^version:"
          $version = $line.Line -replace "^version:\s*", "" -replace "\+.*", ""
          echo "VERSION_NAME=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Ensure Windows desktop project exists
        shell: pwsh
        run: |
          if (!(Test-Path "windows/runner/CMakeLists.txt")) {
            Write-Host "Windows desktop scaffolding missing, generating with flutter create..."
            flutter create . --platforms=windows
          }

      - name: Get dependencies
        run: flutter pub get

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Windows
        run: flutter build windows --release

      - name: Update Installer Version
        run: |
          $version = "${{ env.VERSION_NAME }}.${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}"
          (Get-Content windows/installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`"" | Set-Content windows/installer.iss
          Get-Content windows/installer.iss | Select-String "MyAppVersion"

      - name: Build Installer
        run: iscc windows/installer.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-windows-installer
          path: windows/installer/OpenLogTool-Setup-*.exe


  # 构建 macOS
  build-macos:
    needs: get-version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get pubspec version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | sed 's/+.*//')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release
          echo "=== Build output ==="
          ls -la build/macos/Build/Products/Release/
          find build/macos/Build/Products/Release/ -name "*.app" -type d

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-macos
          path: build/macos/Build/Products/Release/

  # 创建 Release（仅在 main 分支推送时）
  release:
    needs: [get-version, build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}
          name: OpenLogTool v${{ env.VERSION_NAME }}-${{ needs.get-version.outputs.short_sha }}.${{ needs.get-version.outputs.build_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/openlogtool-android-apk/*.apk
            artifacts/openlogtool-linux/*.tar.gz
            artifacts/openlogtool-windows-installer/*.exe
            artifacts/openlogtool-windows-build/**/*
            artifacts/openlogtool-macos/**/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
