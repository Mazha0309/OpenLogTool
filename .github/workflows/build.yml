name: Build OpenLogTool

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.4'
  DART_VERSION: '3.5.3'

jobs:
  # 读取提交号作为版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          # 获取提交SHA
          SHA=${{ github.sha }}
          SHORT_SHA=${SHA:0:7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # 获取构建次数作为版本号
          BUILD_NUMBER=${{ github.run_number }}
          # 确保版本号从1开始
          VERSION=$((BUILD_NUMBER))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

  # 构建 Android APK
  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          dart-version: ${{ env.DART_VERSION }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK with version
        run: |
          flutter build apk --release \
            --build-name="${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.short_sha }}" \
            --build-number="${{ needs.get-version.outputs.build_number }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 构建 Linux AppImage
  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev fuse libfuse2 imagemagick

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          dart-version: ${{ env.DART_VERSION }}

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package as AppImage
        run: |
          # 安装 appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          # 创建 AppDir 目录结构
          mkdir -p OpenLogTool.AppDir/usr/bin
          mkdir -p OpenLogTool.AppDir/usr/lib
          mkdir -p OpenLogTool.AppDir/usr/share/applications
          mkdir -p OpenLogTool.AppDir/usr/share/icons/hicolor/256x256/apps
          
          # 复制构建产物
          cp build/linux/x64/release/bundle/openlogtool OpenLogTool.AppDir/usr/bin/
          cp -r build/linux/x64/release/bundle/lib/* OpenLogTool.AppDir/usr/lib/
          
          # 创建 desktop 文件
          cat > OpenLogTool.AppDir/openlogtool.desktop << 'EOF'
          [Desktop Entry]
          Name=OpenLogTool
          Comment=Amateur Radio Log Tool
          Exec=openlogtool
          Icon=openlogtool
          Terminal=false
          Type=Application
          Categories=Utility;X-Amateur-Radio;
          EOF
          
          # 复制图标
          cp linux/runner/resources/icon.png OpenLogTool.AppDir/usr/share/icons/hicolor/256x256/apps/openlogtool.png
          cp OpenLogTool.AppDir/usr/share/icons/hicolor/256x256/apps/openlogtool.png OpenLogTool.AppDir/openlogtool.png
          
          # 构建 AppImage
          ./appimagetool OpenLogTool.AppDir OpenLogTool-${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.short_sha }}-linux-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-linux-appimage
          path: OpenLogTool-${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.short_sha }}-linux-x86_64.AppImage

  # 构建 Windows
  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          dart-version: ${{ env.DART_VERSION }}

      - name: Install ImageMagick
        uses: al-cheb/install-image-magick@v1
        with:
          version: "7.1.1-34"

      - name: Fix Windows icon
        run: |
          # 使用magick转换图标为正确的ICO格式
          magick icon.png -resize 256x256 windows/runner/resources/app_icon.ico

      - name: Add Windows desktop support
        run: flutter create . --platforms=windows

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-windows
          path: build/windows/runner/Release

  # 构建 macOS
  build-macos:
    needs: get-version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          dart-version: ${{ env.DART_VERSION }}

      - name: Add macOS desktop support
        run: flutter create . --platforms=macos

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: openlogtool-macos
          path: build/macos/Build/Products/Release

  # 创建 Release（仅在 main 分支推送时）
  release:
    needs: [get-version, build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.short_sha }}
          name: OpenLogTool v${{ needs.get-version.outputs.version }}.${{ needs.get-version.outputs.short_sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/openlogtool-android-apk/*.apk
            artifacts/openlogtool-linux-appimage/*.AppImage
            artifacts/openlogtool-windows/*.exe
            artifacts/openlogtool-macos/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
